<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 60" fill="none" role="img" aria-label="RSSA Lugano">
  <title>RSSA Lugano</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&amp;display=swap');
    </style>
  </defs>

  <!-- Guillemet mark « — two left-pointing chevrons -->
  <path d="M14 9 L3 30 L14 51"
        stroke="#9C3A28" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M27 9 L16 30 L27 51"
        stroke="#9C3A28" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RSSA wordmark -->
  <text x="42" y="38"
        font-family="'Bricolage Grotesque','Helvetica Neue',Helvetica,sans-serif"
        font-size="31" font-weight="700" letter-spacing="-1.2"
        fill="#181620">RSSA</text>

  <!-- LUGANO sub-label -->
  <text x="43" y="53"
        font-family="'Bricolage Grotesque','Helvetica Neue',Helvetica,sans-serif"
        font-size="10" font-weight="500" letter-spacing="3.5"
        fill="#9A9896">LUGANO</text>
</svg>
