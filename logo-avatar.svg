<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="RSSA Lugano">
  <title>RSSA Lugano</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&amp;display=swap');
    </style>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#181620"/>

  <!-- Guillemet mark « — large, centered horizontally, upper portion -->
  <!-- Chevron 1: right edge at x=96, apex at x=61, height from y=46 to y=118 -->
  <path d="M96 46 L61 82 L96 118"
        stroke="#9C3A28" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chevron 2: right edge at x=139, apex at x=104 -->
  <path d="M139 46 L104 82 L139 118"
        stroke="#9C3A28" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RSSA wordmark, centred below the mark -->
  <text x="100" y="158"
        font-family="'Bricolage Grotesque','Helvetica Neue',Helvetica,sans-serif"
        font-size="28" font-weight="700" letter-spacing="-0.8"
        text-anchor="middle"
        fill="#F6F4EE">RSSA</text>

  <!-- Lugano micro-label -->
  <text x="100" y="175"
        font-family="'Bricolage Grotesque','Helvetica Neue',Helvetica,sans-serif"
        font-size="9.5" font-weight="500" letter-spacing="3"
        text-anchor="middle"
        fill="#6B6966">LUGANO</text>
</svg>
